<style>
    body {
        margin: 0;
    }
    .anim-container {
        width: 800px;
        height: 600px;
        background-color: #222;
        overflow: hidden;
        position: relative;
    }
    .anim-item {
        display: flex;
        position: absolute;
        border-radius: 4px;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 12px;
        font-weight: bold;
    }
    .anim-overlay {
        position: absolute;
        left: 10px;
        top: 10px;
        color: white;
        font-size: 14px;
        background-color: rgba(0,0,0,0.5);
        padding: 5px;
    }
</style>

<div class="anim-container">
    {% for item in items %}
    <div class="anim-item"
        style="left: {{ item.x }}px; top: {{ item.y }}px; width: {{ item.size }}px; height: {{ item.size }}px; background-color: {{ item.color }};">
        {{ item.text }}
    </div>
    {% endfor %}
    <div class="anim-overlay">
        FPS: {{ fps }} <br>
        Items: {{ item_count }} <br>
        Render Time: {{ render_time_ms }}ms
    </div>
</div>
