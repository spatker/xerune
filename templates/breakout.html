<style>
    .game-container {
        position: absolute;
        left: 0;
        top: 0;
        background-color: #111111;
    }
    .game-block {
        position: absolute;
        border-radius: 4px;
    }
    .game-particle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 3px;
    }
    .game-paddle {
        position: absolute;
        background-color: #ffffff;
        border-radius: 8px;
    }
    .game-ball {
        position: absolute;
        background-color: #ffffff;
        border-radius: 50%;
    }
    .game-overlay {
        position: absolute;
        left: 0;
        top: 0;
        background-color: rgba(0,0,0,0.8);
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .game-overlay p {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
    }
    .game-overlay-over p {
        color: #ff5555;
    }
    .game-overlay-win p {
        color: #55ff55;
    }
</style>

<div class="game-container" style="width: {{ game_width }}px; height: {{ game_height }}px;">

    <!-- Blocks -->
    {% for block in blocks %}
    {% if block.alive %}
    <div class="game-block"
        style="left: {{ block.x }}px; top: {{ block.y }}px; width: {{ block_w }}px; height: {{ block_h }}px; background-color: {{ block.color }};">
    </div>
    {% endif %}
    {% endfor %}

    <!-- Particles -->
    {% for p in particles %}
    <div class="game-particle" style="left: {{ p.x }}px; top: {{ p.y }}px; background-color: {{ p.color }};">
    </div>
    {% endfor %}

    <!-- Paddle -->
    <div class="game-paddle"
        style="left: {{ paddle_x }}px; top: {{ paddle_y }}px; width: {{ paddle_w }}px; height: {{ paddle_h }}px;">
    </div>

    <!-- Ball -->
    <div class="game-ball"
        style="left: {{ ball_x }}px; top: {{ ball_y }}px; width: {{ ball_s }}px; height: {{ ball_s }}px;">
    </div>

    <!-- UI Overlay for Game Over/Win -->
    {% if game_over %}
    <div class="game-overlay game-overlay-over" style="width: {{ game_width }}px; height: {{ game_height }}px;">
        <p>GAME OVER</p>
    </div>
    {% endif %}

    {% if won %}
    <div class="game-overlay game-overlay-win" style="width: {{ game_width }}px; height: {{ game_height }}px;">
        <p>YOU WIN!</p>
    </div>
    {% endif %}

</div>
