<style>
    .calc-container {
        flex-direction: column;
        width: 400px;
        height: 500px;
        background-color: #2c2c2e;
        padding: 20px;
        border-radius: 12px;
        font-family: 'Roboto';
    }
    .calc-display {
        height: 100px;
        background-color: #1c1c1e;
        border-radius: 8px;
        margin-bottom: 20px;
        justify-content: flex-end;
        align-items: flex-end;
        padding: 15px;
    }
    .calc-display span {
        color: white;
        font-size: 48px;
        font-weight: bold;
    }
    .calc-keypad {
        flex-direction: column;
        flex-grow: 1;
        align-items: stretch;
        justify-content: space-between;
    }
    .calc-row {
        flex-direction: row;
        justify-content: space-between;
        height: 60px;
    }
    .calc-btn {
        width: 80px;
        border-radius: 40px;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }
    .calc-btn.wide {
        width: 170px;
    }
    .calc-btn-dark {
        background-color: #3a3a3c;
    }
    .calc-btn-orange {
        background-color: #ff9f0a;
    }
    .calc-btn span {
        color: white;
        font-size: 24px;
        font-weight: bold;
    }
</style>

<div class="calc-container">
    <!-- Display -->
    <div class="calc-display">
        <span>{{ display }}</span>
    </div>

    <!-- Keypad -->
    <div class="calc-keypad">
        <!-- Row 1 -->
        <div class="calc-row">
            <div class="calc-btn calc-btn-orange" data-on-click="clear">
                <span>C</span>
            </div>
            <div class="calc-btn calc-btn-orange" data-on-click="op:/">
                <span>÷</span>
            </div>
        </div>

        <!-- Row 2 -->
        <div class="calc-row">
            <div class="calc-btn calc-btn-dark" data-on-click="digit:7">
                <span>7</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:8">
                <span>8</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:9">
                <span>9</span>
            </div>
            <div class="calc-btn calc-btn-orange" data-on-click="op:*">
                <span>×</span>
            </div>
        </div>

        <!-- Row 3 -->
        <div class="calc-row">
            <div class="calc-btn calc-btn-dark" data-on-click="digit:4">
                <span>4</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:5">
                <span>5</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:6">
                <span>6</span>
            </div>
            <div class="calc-btn calc-btn-orange" data-on-click="op:-">
                <span>-</span>
            </div>
        </div>

        <!-- Row 4 -->
        <div class="calc-row">
            <div class="calc-btn calc-btn-dark" data-on-click="digit:1">
                <span>1</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:2">
                <span>2</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:3">
                <span>3</span>
            </div>
            <div class="calc-btn calc-btn-orange" data-on-click="op:+">
                <span>+</span>
            </div>
        </div>

        <!-- Row 5 -->
        <div class="calc-row">
            <div class="calc-btn calc-btn-dark wide" data-on-click="digit:0">
                <span>0</span>
            </div>
            <div class="calc-btn calc-btn-dark" data-on-click="digit:.">
                <span>.</span>
            </div>
            <div class="calc-btn calc-btn-orange" data-on-click="equals">
                <span>=</span>
            </div>
        </div>
    </div>
</div>
