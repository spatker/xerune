<style>
    .music-list-container {
        display: flex;
        position: absolute;
        top: 0;
        width: 760px;
        height: 440px;
        flex-direction: column;
        padding: 20px;
    }
    .library-title {
        font-size: 32px;
        font-weight: 700;
        margin: 10px 0 20px 10px;
        color: #1ed760;
    }
    .track-list {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow: scroll;
        min-height: 0;
    }
    .track-item {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 15px;
        margin: 5px 10px;
        background-color: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.05);
        flex-shrink: 0;
        cursor: pointer;
        border-radius: 12px;
    }
    .track-item.hovered {
        background-color: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.2);
    }
    .track-item.active {
        background-color: rgba(255,255,255,0.2);
        border-color: #1ed760;
    }
    .track-cover {
        width: 56px;
        height: 56px;
        margin-right: 20px;
        border-radius: 8px;
    }
    .track-details {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex-grow: 1;
    }
    .track-title {
        font-size: 18px;
        margin: 0 0 4px 0;
        color: #ffffff;
        font-weight: 600;
    }
    .track-artist {
        font-size: 14px;
        margin: 0;
        color: #a0a0a0;
    }
    .track-duration {
        font-size: 14px;
        color: #888888;
        font-weight: 500;
    }
    .track-play-indicator {
        margin-left: 20px;
        font-size: 20px;
        color: #1ed760;
    }
</style>

<div class="music-list-container" style="left: {{ list_x }}px;">
    <!-- Selection View (Landscape List) -->
    <p class="library-title">My Library</p>

    <div class="track-list">
        {% for track in tracks %}
        <div data-on-click="select_track:{{ track.id }}" data-on-hover="hover_track:{{ track.id }}"
            data-on-hover-out="unhover_track"
            class="track-item{% if track.id == hovered_track %} hovered{% else if loop.index0 == active_list_index %} active{% endif %}">
            <img src="{{ track.cover_url }}" class="track-cover" />
            <div class="track-details">
                <p class="track-title">{{ track.title }}</p>
                <p class="track-artist">{{ track.artist }}</p>
            </div>
            <p class="track-duration">{{ track.duration }}</p>
            <div class="track-play-indicator">
                {% if track.id == hovered_track %} |&gt; {% else if loop.index0 == active_list_index %} |&gt; {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
