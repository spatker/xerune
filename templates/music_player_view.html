<style>
    .player-view-container {
        display: flex;
        position: absolute;
        top: 0;
        width: 760px;
        height: 440px;
        flex-direction: row;
        padding: 20px;
    }
    .left-section {
        display: flex;
        flex-direction: column;
        width: 340px;
        align-items: center;
        justify-content: flex-start;
        margin-right: 40px;
    }
    .back-btn-row {
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
        width: 100%;
        margin-bottom: 20px;
    }
    .back-btn {
        padding: 10px;
        border-radius: 20px;
        background-color: rgba(255,255,255,0.05);
    }
    .back-btn p {
        font-size: 16px;
        color: #ffffff;
        font-weight: bold;
        margin: 0;
    }
    .album-art {
        width: 280px;
        height: 280px;
        border-radius: 16px;
    }
    .right-section {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        justify-content: flex-end;
        padding-right: 20px;
        padding-bottom: 20px;
    }
    .track-info-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
    }
    .track-title-text {
        font-size: 28px;
        margin: 0 0 5px 0;
        color: #ffffff;
        font-weight: 700;
    }
    .track-artist-text {
        font-size: 18px;
        color: #b3b3b3;
        margin: 0 0 5px 0;
    }
    .track-album-text {
        font-size: 14px;
        color: #888888;
        font-weight: 500;
        margin: 0;
    }
    .visualizer-container {
        padding: 10px;
        margin-bottom: 20px;
    }
    .progress-bar-container {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
    }
    .time-label {
        font-size: 14px;
        color: #b3b3b3;
        width: 45px;
    }
    .time-label.left-label {
        text-align: left;
    }
    .time-label.right-label {
        text-align: right;
    }
    .slider-track {
        flex-grow: 1;
        margin: 0 10px;
        height: 6px;
        border-radius: 3px;
        background-color: rgba(255,255,255,0.1);
        position: relative;
    }
    .slider-fill {
        height: 100%;
        border-radius: 3px;
        background-color: #1ed760;
    }
    .slider-handle {
        width: 12px;
        height: 12px;
        border-radius: 6px;
        background-color: #ffffff;
        position: absolute;
        top: -3px;
    }
    .controls-row {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        padding: 0 20px;
    }
    .control-btn {
        padding: 15px;
        border-radius: 50%;
    }
    .control-btn p {
        font-size: 24px;
        color: #ffffff;
        margin: 0;
    }
    .control-btn-stop p {
        color: #ff5555;
    }
    .play-pause-btn {
        padding: 20px 25px;
        background: linear-gradient(135deg, #1ed760 0%, #1db954 100%);
        border-radius: 50%;
    }
    .play-pause-btn p {
        font-size: 26px;
        color: #000000;
        font-weight: bold;
        margin: 0;
    }
</style>

<div class="player-view-container" style="left: {{ player_x }}px;">
    <!-- Player View (Landscape) -->
    <!-- Left: Album Art -->
    <div class="left-section">
        <!-- Back Button (Top Left of this section) -->
        <div class="back-btn-row">
            <div data-on-click="back" class="back-btn">
                <p>&lt; Back</p>
            </div>
        </div>
        <img src="{{ current_track.cover_url }}" class="album-art" />
    </div>

    <!-- Right: Controls & Visualizer -->
    <div class="right-section">

        <!-- Track Info above Visualizer -->
        <div class="track-info-header">
            <h1 class="track-title-text">{{ current_track.title }}</h1>
            <p class="track-artist-text">{{ current_track.artist }}</p>
            <p class="track-album-text">{{ current_track.album }}</p>
        </div>

        <!-- Visualizer -->
        <div class="visualizer-container">
            <canvas id="visualizer" width="360" height="80"></canvas>
        </div>

        <!-- Progress Slider -->
        <div class="progress-bar-container">
            <p class="time-label left-label">{{ elapsed_time }}</p>
            <div class="slider-track">
                <div class="slider-fill" style="width: {{ progress * 100.0 }}%;"></div>
                <div class="slider-handle" style="left: calc({{ progress * 100.0 }}% - 6px);"></div>
            </div>
            <p class="time-label right-label">{{ total_time }}</p>
        </div>

        <!-- Buttons -->
        <div class="controls-row">
            <div data-on-click="prev" class="control-btn">
                <p>|&lt;</p>
            </div>
            <div data-on-click="play_pause" class="play-pause-btn">
                {% if is_playing %}
                <p>||</p>
                {% else %}
                <p>&gt;</p>
                {% endif %}
            </div>
            <div data-on-click="stop" class="control-btn control-btn-stop">
                <p>[ ]</p>
            </div>
            <div data-on-click="next" class="control-btn">
                <p>&gt;|</p>
            </div>
        </div>
    </div>
</div>
